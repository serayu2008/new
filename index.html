<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 기온 vs 최고 전력수요 상관관계 분석</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f7fafc;
            margin: 0;
            padding: 25px;
            color: #2d3748;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        header {
            text-align: center;
            margin-bottom: 25px;
        }
        h1 { margin: 0 0 8px 0; font-size: 24px; color: #1a202c; }
        p { margin: 0; color: #718096; font-size: 14px; }

        .chart-container {
            position: relative;
            height: 550px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
        }
        .status-message {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            color: #4a5568;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📊 2025년 기온 변동에 따른 일일 최고 전력수요 상관관계 분석</h1>
        <p>temp.csv와 power.csv 데이터를 자동으로 매칭하여 365일간의 상관관계 산점도를 시각화합니다.</p>
    </header>

    <div class="chart-container">
        <div id="status-panel" class="status-message">데이터 파일을 서버에서 불러오는 중입니다...</div>
        <canvas id="scatterChart"></canvas>
    </div>
</div>

<script>
    // 요청하신 파일명으로 정확히 매칭
    const URL_TEMP = "./temp.csv";
    const URL_POWER = "./power.csv";

    let tempDataset = {};  
    let powerDataset = {}; 
    let chartInstance = null;

    window.addEventListener('DOMContentLoaded', () => {
        loadDataFromServer();
    });

    // 날짜 문자열에서 숫자 8자리만 추출하여 통일 (예: \t2025-01-01 -> 20250101)
    function extractDateKey(str) {
        if (!str) return '';
        return str.replace(/[^0-9]/g, '').trim();
    }

    function loadDataFromServer() {
        let tReady = false;
        let pReady = false;

        // 1. 기온 파일 자동 로드
        Papa.parse(URL_TEMP, {
            download: true,
            skipEmptyLines: true,
            complete: function(results) {
                parseTempData(results.data);
                tReady = true;
                checkAndRender(tReady, pReady);
            },
            error: function(err) {
                document.getElementById('status-panel').innerText = "❌ temp.csv 파일을 불러오지 못했습니다. 파일명을 확인해 주세요.";
                console.error(err);
            }
        });

        // 2. 전력 파일 자동 로드
        Papa.parse(URL_POWER, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                parsePowerData(results.data);
                pReady = true;
                checkAndRender(tReady, pReady);
            },
            error: function(err) {
                document.getElementById('status-panel').innerText = "❌ power.csv 파일을 불러오지 못했습니다. 파일명을 확인해 주세요.";
                console.error(err);
            }
        });
    }

    function parseTempData(rows) {
        let headerPassed = false;
        rows.forEach(row => {
            if (!row[0]) return;
            let cell = row[0].trim();
            
            if (cell.includes('날짜')) {
                headerPassed = true;
                return;
            }
            
            if (headerPassed) {
                let dateKey = extractDateKey(cell);
                if (dateKey.length === 8) {
                    tempDataset[dateKey] = {
                        avg: parseFloat(row[2]), // 평균기온
                        originalStr: cell.replace(/\s+/g, '') // 툴팁 표기용
                    };
                }
            }
        });
    }

    function parsePowerData(rows) {
        rows.forEach(row => {
            if (!row['날짜']) return;
            let dateKey = extractDateKey(row['날짜']);
            
            let dailyPeak = 0;
            for (let i = 1; i <= 24; i++) {
                let colName = `${i}시`;
                if (row[colName]) {
                    let val = parseInt(row[colName].replace(/,/g, ''));
                    if (val > dailyPeak) dailyPeak = val;
                }
            }
            
            if (dailyPeak > 0 && dateKey.length === 8) {
                powerDataset[dateKey] = dailyPeak;
            }
        });
    }

    function checkAndRender(t, p) {
        if (!t || !p) return;

        let finalScatterData = [];

        Object.keys(powerDataset).forEach(dateKey => {
            if (tempDataset[dateKey] !== undefined) {
                finalScatterData.push({
                    x: tempDataset[dateKey].avg,
                    y: powerDataset[dateKey],
                    labelDate: tempDataset[dateKey].originalStr
                });
            }
        });

        if (finalScatterData.length === 0) {
            document.getElementById('status-panel').innerHTML = "⚠️ 데이터 매칭 실패<br>두 파일의 날짜 형식이 일치하지 않거나 데이터가 비어있습니다.";
            return;
        }

        document.getElementById('status-panel').style.display = 'none';
        renderChart(finalScatterData);
    }

    function renderChart(chartData) {
        const ctx = document.getElementById('scatterChart').getContext('2d');
        
        chartInstance = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: '2025년 일별 매칭 데이터 (365일)',
                    data: chartData,
                    backgroundColor: 'rgba(66, 153, 225, 0.65)',
                    borderColor: '#2b6cb0',
                    pointRadius: 5,
                    hoverRadius: 7
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: '2025년 평균 기온 변동에 따른 대한민국 최고 전력수요 상관관계 산점도',
                        font: { size: 16, weight: 'bold' }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let d = context.raw;
                                return `[${d.labelDate}] 평균기온: ${d.x}℃ | 최고전력: ${d.y.toLocaleString()} MW`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        title: { display: true, text: '일평균 기온 (℃)', font: { weight: 'bold' } },
                        grid: { color: '#edf2f7' }
                    },
                    y: {
                        title: { display: true, text: '당일 최고 전력수요량 (MW)', font: { weight: 'bold' } },
                        grid: { color: '#edf2f7' }
                    }
                }
            }
        });
    }
</script>
</body>
</html>
