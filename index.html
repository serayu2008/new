<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 기온 및 전력수요 분석</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 20px;
        }
        h1 { margin: 0 0 10px 0; color: #2d3748; font-size: 26px; }
        p { margin: 0; color: #718096; }
        
        .setup-box {
            background-color: #ebf8ff;
            border: 1px solid #bee3f8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            background: #f7fafc;
            padding: 15px;
            border-radius: 8px;
        }
        .control-group { display: flex; align-items: center; gap: 10px; }
        label { font-weight: bold; color: #4a5568; }
        select, input { padding: 8px 12px; border: 1px solid #cbd5e0; border-radius: 6px; }
        button { 
            padding: 8px 16px; 
            background: #3182ce; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover { background: #2b6cb0; }

        .chart-container {
            position: relative;
            height: 450px;
            margin-bottom: 30px;
        }
        
        .loading {
            position: absolute;
            top:0; left:0; right:0; bottom:0;
            background: rgba(255,255,255,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: #4a5568;
            z-index: 5;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .info-card {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #3182ce;
        }
        .info-card h3 { margin: 0 0 10px 0; font-size: 16px; color: #4a5568; }
        .info-card p { font-size: 20px; font-weight: bold; color: #2d3748; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>2025년 기온 변동에 따른 전력수요 영향 분석</h1>
        <p>기상청 서울 기온 데이터 및 전력거래소 전국 시간별 전력수요량 융합 시각화</p>
    </header>

    <div class="setup-box">
        <strong>🌐 배포 환경 자동 로드 지원</strong> (만약 무한 로딩 발생 시 아래 버튼으로 파일을 각각 지정해 주셔도 바로 작동합니다.)
        <div style="margin-top: 10px; display: flex; justify-content: center; gap: 15px; font-size: 13px;">
            <label>기온(temp): <input type="file" id="local-temp" accept=".csv"></label>
            <label>전력(power): <input type="file" id="local-power" accept=".csv"></label>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="date-select">분석 대상 날짜 선택:</label>
            <input type="date" id="date-select" min="2025-01-01" max="2025-12-31" value="2025-01-01">
        </div>
        <button id="btn-analyze">데이터 분석하기</button>
    </div>

    <div class="chart-container">
        <div id="loading-spinner" class="loading">데이터 파일을 불러오는 중입니다...</div>
        <canvas id="analysisChart"></canvas>
    </div>

    <div class="info-grid">
        <div class="info-card">
            <h3>선택일 기온 요약 (서울시 기준)</h3>
            <p id="info-temp">평균: - ℃ (최저: - ℃ / 최고: - ℃)</p>
        </div>
        <div class="info-card" style="border-left-color: #e53e3e;">
            <h3>선택일 전력수요 요약 (전국 기준)</h3>
            <p id="info-power">일일 총량: - MW (최대 전력: - MW)</p>
        </div>
    </div>
</div>

<script>
    // 대소문자 매칭 오류를 피하기 위한 파일명 목록 선언 (소문자 우선 시도)
    let tempUrl = "./temp.csv";
    let powerUrl = "./power.csv";

    let globalTempData = {};
    let globalPowerData = {};
    let myChart = null;

    window.addEventListener('DOMContentLoaded', () => {
        startServerLoading();
        setupEvents();
    });

    function setupEvents() {
        document.getElementById('btn-analyze').addEventListener('click', renderChart);
        
        // 로컬 파일 수동 업로드 이벤트 안전장치 추가
        document.getElementById('local-temp').addEventListener('change', (e) => {
            Papa.parse(e.target.files[0], {
                skipEmptyLines: true,
                complete: function(results) { processTemp(results.data); checkDataReady(); }
            });
        });
        document.getElementById('local-power').addEventListener('change', (e) => {
            Papa.parse(e.target.files[0], {
                header: true,
                skipEmptyLines: true,
                complete: function(results) { processPower(results.data); checkDataReady(); }
            });
        });
    }

    // 서버 호스팅 파일 로드 함수
    function startServerLoading() {
        let tReady = false;
        let pReady = false;

        // 1. 기온 파일 로드
        Papa.parse(tempUrl, {
            download: true,
            skipEmptyLines: true,
            complete: function(results) {
                processTemp(results.data);
                tReady = true;
                checkDataReady(tReady, pReady);
            },
            error: function() {
                // 소문자 실패시 대문자로 2차 시도
                Papa.parse("./temp.CSV", {
                    download: true,
                    skipEmptyLines: true,
                    complete: function(res) { processTemp(res.data); tReady = true; checkDataReady(tReady, pReady); }
                });
            }
        });

        // 2. 전력 파일 로드
        Papa.parse(powerUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                processPower(results.data);
                pReady = true;
                checkDataReady(tReady, pReady);
            },
            error: function() {
                // 소문자 실패시 대문자로 2차 시도
                Papa.parse("./power.CSV", {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: function(res) { processPower(res.data); pReady = true; checkDataReady(tReady, pReady); }
                });
            }
        });
    }

    function checkDataReady(t, p) {
        if((t && p) || (Object.keys(globalTempData).length > 0 && Object.keys(globalPowerData).length > 0)) {
            document.getElementById('loading-spinner').style.display = 'none';
            renderChart();
        }
    }

    // 기온 가공 (\t 및 메타라인 예외 처리 강화)
    function processTemp(data) {
        let isDataSection = false;
        data.forEach(row => {
            if (!row[0]) return;
            let firstCell = row[0].replace(/\s+/g, '').trim();
            if (firstCell.includes('날짜')) { isDataSection = true; return; }
            
            if (isDataSection) {
                let cleanDate = firstCell.replace(/[^0-9-]/g, ''); // 날짜 포맷만 추출
                if(cleanDate.length >= 10) {
                    globalTempData[cleanDate] = {
                        avg: parseFloat(row[2]),
                        min: parseFloat(row[3]),
                        max: parseFloat(row[4])
                    };
                }
            }
        });
    }

    // 전력 데이터 가공
    function processPower(data) {
        data.forEach(row => {
            if(!row['날짜']) return;
            let cleanDate = row['날짜'].replace(/\s+/g, '').trim();
            let dayArr = [];
            for(let i=1; i<=24; i++) {
                let key = `${i}시`;
                let val = row[key] ? parseInt(row[key].replace(/,/g, '')) : 0;
                dayArr.push(val);
            }
            globalPowerData[cleanDate] = dayArr;
        });
    }

    // 시각화 차트 그리기
    function renderChart() {
        const targetDate = document.getElementById('date-select').value;
        const tempInfo = globalTempData[targetDate];
        const powerInfo = globalPowerData[targetDate];

        if(!tempInfo || !powerInfo) {
            alert("선택하신 날짜의 데이터를 매칭할 수 없습니다. 파일명을 다시 확인해주세요.");
            return;
        }

        // 하단 텍스트 정보 업데이트
        document.getElementById('info-temp').innerText = `평균: ${tempInfo.avg}℃ (최저: ${tempInfo.min}℃ / 최고: ${tempInfo.max}℃)`;
        
        let totalSum = powerInfo.reduce((a,b)=>a+b, 0);
        let maxVal = Math.max(...powerInfo);
        let peakHour = powerInfo.indexOf(maxVal) + 1;
        document.getElementById('info-power').innerText = `일일 총량: ${totalSum.toLocaleString()} MW (최대 피크: ${maxVal.toLocaleString()} MW / ${peakHour}시)`;

        // 시간대별 가상 기온 추이선 생성 (최저~최고 기온을 사인곡선으로 매핑하여 분석 고도화)
        const hoursLabels = Array.from({length: 24}, (_, i) => `${i + 1}시`);
        let hourlyTempTrend = hoursLabels.map((_, idx) => {
            let sineRad = Math.sin((idx - 6) / 24 * 2 * Math.PI) * 0.5 + 0.5;
            return Math.round((tempInfo.min + (tempInfo.max - tempInfo.min) * sineRad) * 10) / 10;
        });

        if(myChart) myChart.destroy();

        const ctx = document.getElementById('analysisChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: hoursLabels,
                datasets: [
                    {
                        label: '시간별 전력수요량 (MW)',
                        data: powerInfo,
                        borderColor: '#3182ce',
                        backgroundColor: 'rgba(49, 130, 206, 0.1)',
                        yAxisID: 'y-axis-power',
                        fill: true,
                        tension: 0.2
                    },
                    {
                        label: '당일 기온 변화 추정 (℃)',
                        data: hourlyTempTrend,
                        borderColor: '#e53e3e',
                        borderDash: [6, 4],
                        yAxisID: 'y-axis-temp',
                        pointRadius: 4,
                        tension: 0.3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    'y-axis-power': {
                        type: 'linear',
                        position: 'left',
                        title: { display: true, text: '전력수요량 (MW)', font: { weight: 'bold' } }
                    },
                    'y-axis-temp': {
                        type: 'linear',
                        position: 'right',
                        title: { display: true, text: '기온 (℃)', font: { weight: 'bold' } },
                        grid: { drawOnChartArea: false }
                    }
                }
            }
        });
    }
</script>
</body>
</html>
