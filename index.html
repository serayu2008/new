<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기온 vs 전력수요 상관관계 분석</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-color: #ffffff;
            --text-color: #212529;
            --primary-color: #0d6efd;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-color);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
            background: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #495057;
        }

        select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            background-color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .status {
            font-size: 0.9rem;
            font-weight: bold;
            color: #666;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 500px;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            font-size: 1.2rem;
            padding: 50px;
        }
    </style>
</head>
<body>

<header>
    <h1>🌡️ 기온과 시간별 전력수요 관계 분석</h1>
    <p>서울 지역 2025년 데이터를 바탕으로 기온 변동에 따른 전력 소비 트렌드를 시각화합니다.</p>
</header>

<div class="container">
    <div class="controls">
        <div class="control-group">
            <label for="timeSelect">분석 시간대</label>
            <select id="timeSelect">
                <option value="all">하루 전체 (01시~24시)</option>
                <script>
                    for(let i=1; i<=24; i++) {
                        document.write(`<option value="${i}시">${i}시</option>`);
                    }
                </script>
            </select>
        </div>
        <div id="statusMessage" class="status">데이터 로딩 중...</div>
    </div>

    <div id="loading" class="loading-spinner">데이터를 불러와 매칭하는 중입니다...</div>

    <div class="chart-container">
        <canvas id="analysisChart"></canvas>
    </div>
</div>

<script>
    let rawTempData = [];
    let rawPowerData = [];
    let myChart = null;

    // 초기 실행
    document.addEventListener("DOMContentLoaded", () => {
        loadData();
        document.getElementById('timeSelect').addEventListener('change', processAndRender);
    });

    // CSV 데이터 로드 (Promise.all을 이용해 동시에 가져옴)
    async function loadData() {
        showLoading(true);
        try {
            const [tempRes, powerRes] = await Promise.all([
                fetch('temp.csv').then(res => res.text()),
                fetch('power.csv').then(res => res.text())
            ]);

            // temp.csv 상단에 포함된 메타데이터(7줄)를 건너뛰기 위해 기온분석 헤더 위치 파악 후 슬라이싱
            const tempCleaned = cleanTempCSV(tempRes);

            // PapaParse를 이용한 CSV 파싱
            rawTempData = Papa.parse(tempCleaned, { header: true, skipEmptyLines: true }).data;
            rawPowerData = Papa.parse(powerRes, { header: true, skipEmptyLines: true }).data;

            document.getElementById('statusMessage').innerText = "✅ 데이터 로드 완료";
            showLoading(false);
            
            // 최초 차트 렌더링 (전체 시간 기준)
            processAndRender();

        } catch (error) {
            console.error(error);
            document.getElementById('statusMessage').innerText = "❌ 파일 로드 실패 (temp.csv와 power.csv가 같은 폴더에 있는지 확인하세요)";
            showLoading(false);
        }
    }

    // temp.csv의 상단 검색조건 텍스트 영역을 제거하고 순수 데이터만 추출하는 함수
    function cleanTempCSV(text) {
        const lines = text.split('\n');
        // '날짜,지점...'으로 시작하는 헤더 행의 인덱스를 찾음
        const headerIndex = lines.findIndex(line => line.includes('날짜') && line.includes('평균기온'));
        if (headerIndex !== -1) {
            return lines.slice(headerIndex).join('\n');
        }
        return text;
    }

    // 데이터 가공 및 시각화 실행
    function processAndRender() {
        const selectedTime = document.getElementById('timeSelect').value;
        
        // 1. 전력 데이터를 날짜 기반 맵으로 변환하여 탐색 속도 최적화
        // power.csv 날짜 포맷은 YYYY-MM-DD
        const powerMap = new Map();
        rawPowerData.forEach(row => {
            if(row['날짜']) {
                powerMap.set(row['날짜'].trim(), row);
            }
        });

        const chartData = [];

        // 2. 기온 데이터를 돌며 날짜 일치하는 전력 데이터를 매칭
        rawTempData.forEach(tRow => {
            if (!tRow['날짜'] || !tRow['평균기온(℃)']) return;
            
            // temp.csv 날짜 데이터의 공백 제거 (데이터에 \t가 섞여있을
